    # orcid: omitted in v1.0 deposit; add via deposit edit if/when registered.

description: |
  We propose a formal model in which identity is not a primitive but a
  layered accountability chain that accretes from a founding individuation
  event and persists as long as cryptographic, relational, and civic
  verification can be reconstructed. The model unifies biological, machine,
  and artificial-intelligence cases under a single schema with six accretion
  layers and a four-tier permanence hierarchy for substrate-level identifiers.

  We state and prove seven results that bear directly on engineering:
  (i) Founding uniqueness — every identity locus has exactly one origin
  event; (ii) Tier monotonicity — the permanence of an identity claim is
  non-increasing in the tier of its substrate identifier; (iii) Stratum
  well-foundedness — every scoped or agent identity traces in finite steps
  to a person- or organization-rooted identity; (iv) LLM instance
  non-identity — two LLM instances with identical weights but disjoint
  deployment IDs are distinct identity loci; (v) Cryptographic survival —
  only post-quantum-signed identities remain verifiable past a
  cryptographically-relevant quantum computer (CRQC) event;
  (vi) Crypto-shredding completeness — master-key deletion renders all
  envelope-encrypted credentials computationally inaccessible without
  recourse to unpinning; and (vii) Verification-time accountability — the
  reference verify_chain procedure terminates correctly in a finite number
  of steps. Proofs appear in Appendices A.1–A.4 and §5.6, §7.2, §10.7. The
  results are presented as mathematical proofs and are not yet
  machine-checked in a proof assistant.

  Additional results on governance-level participation (chartered scope
  bounding, multi-level participation independence, reputation
  non-transitivity) and privacy-preserving disclosure (selective disclosure
  soundness, unlinkability under pairwise pseudonyms) ground a five-tier
  privacy model in which holders choose what is revealed per action.

  We survey the state of digital identity as of May 2026, noting that no
  major civic identity system runs post-quantum signatures in production
  despite regulatory deadlines of 2030–2035, and that AI agent identity is
  a standards vacuum. We present the Paraxiom architecture as a three-tier
  system combining on-chain post-quantum primitives (QuantumHarmony, with
  SPHINCS+ and Falcon-512), IPFS for bulk encrypted payloads, and
  Postgres+Redis mirrors for query-layer access. Five identity strata
  (S1–S5) cover humans, scoped delegations, vault credentials, agent
  instances, and cross-tenant aggregates.

  The treatise concludes that identity is engineering, not philosophy: the
  accountability chain does not extend itself; the post-quantum signatures
  do not sign themselves. What we build now determines whether identity
  remains a coherent concept past 2040.

